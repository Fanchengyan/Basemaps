    terms_of_use: https://www.esri.com/en-us/legal/terms/full-master-agreement
    description: Esri-provided XYZ tiles offering global satellite imagery, street maps, terrain, and thematic basemaps.
    basemaps:
      - name: World Imagery
        url: https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}
